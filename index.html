<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Kamera HP ke OBS</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  :root{
    --bg:#0d0f14; --panel:#171a22; --accent:#4f8cff; --accent2:#2ecc71;
    --danger:#ff4f5e; --text:#e8ecf5; --muted:#8b93a7;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    height:100%;overflow:hidden;}
  #app{height:100%;display:flex;flex-direction:column;}

  /* --- Pilihan mode --- */
  #modeSelect{display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:100%;gap:20px;padding:24px;text-align:center;}
  #modeSelect h1{font-size:20px;margin:0 0 4px;}
  #modeSelect p{color:var(--muted);font-size:14px;margin:0 0 16px;max-width:340px;}
  .bigbtn{width:100%;max-width:320px;padding:18px;border:none;border-radius:14px;
    font-size:17px;font-weight:600;color:#fff;cursor:pointer;}
  .btn-send{background:var(--accent);}
  .btn-recv{background:var(--accent2);}

  /* --- View umum --- */
  .view{display:flex;flex-direction:column;height:100%;}
  .hidden{display:none !important;}
  .topbar{padding:10px 14px;background:var(--panel);display:flex;align-items:center;
    justify-content:space-between;gap:8px;font-size:13px;}
  .topbar b{font-weight:600;}
  .status{color:var(--muted);}
  .status.ok{color:var(--accent2);}
  .status.err{color:var(--danger);}

  .form{padding:16px;display:flex;flex-direction:column;gap:10px;}
  .form input{padding:14px;border-radius:10px;border:1px solid #2a2f3d;background:#11141b;
    color:var(--text);font-size:15px;}
  .form button{padding:14px;border-radius:10px;border:none;background:var(--accent);
    color:#fff;font-size:15px;font-weight:600;cursor:pointer;}
  .form button.secondary{background:#2a2f3d;}

  video{width:100%;height:100%;object-fit:cover;background:#000;}
  #senderPreviewWrap{flex:1;position:relative;background:#000;overflow:hidden;}
  #senderVideo{width:100%;height:100%;object-fit:cover;}

  /* --- Bar kontrol kamera --- */
  .ctrlbar{position:absolute;bottom:0;left:0;right:0;
    padding:10px 8px calc(10px + env(safe-area-inset-bottom));
    background:linear-gradient(to top, rgba(0,0,0,.8), transparent);
    display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:8px;}
  .roundbtn{width:46px;height:46px;border-radius:50%;border:none;background:rgba(20,22,30,.75);
    color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;
    flex-shrink:0;}
  .roundbtn.off{background:var(--danger);}
  .roundbtn.active{background:var(--accent);}
  .btngroup{display:flex;align-items:center;background:rgba(20,22,30,.75);border-radius:24px;
    overflow:hidden;flex-shrink:0;}
  .btngroup button{width:38px;height:46px;border:none;background:transparent;color:#fff;
    font-size:15px;cursor:pointer;}
  .btngroup button.active{background:var(--accent);}
  .btngroup .label{padding:0 8px;font-size:11px;color:var(--muted);min-width:38px;text-align:center;}

  /* Top-right info kecil saat streaming */
  .topInfo{position:absolute;top:8px;left:8px;font-size:11px;background:rgba(0,0,0,.5);
    padding:5px 9px;border-radius:8px;color:var(--muted);z-index:2;}

  #receiverWrap{flex:1;position:relative;background:#000;}
  #recvOverlay{position:absolute;top:10px;left:10px;font-size:12px;background:rgba(0,0,0,.5);
    padding:6px 10px;border-radius:8px;color:var(--muted);}
</style>
</head>
<body>
<div id="app">

  <div id="modeSelect">
    <h1>Kamera HP &rarr; OBS</h1>
    <p>Pilih mode. Buka mode <b>Kirim</b> di HP yang jadi kamera, dan mode <b>Terima</b> di PC (sebagai Browser Source di OBS).</p>
    <button class="bigbtn btn-send" onclick="goMode('sender')">📷 Kirim dari HP</button>
    <button class="bigbtn btn-recv" onclick="goMode('receiver')">🖥️ Terima di OBS</button>
  </div>

  <!-- MODE PENGIRIM (HP) -->
  <div id="senderView" class="view hidden">
    <div class="topbar">
      <span>Mode: Kirim</span>
      <span class="status" id="senderStatus">Belum terhubung</span>
    </div>
    <div class="form" id="senderForm">
      <input id="roomInputSend" placeholder="Kode ruangan (samakan dgn OBS), mis: rt07-kamera1">
      <button onclick="startSending()">Mulai Kirim ke OBS</button>
    </div>
    <div id="senderPreviewWrap" class="hidden">
      <span class="topInfo" id="topInfo">Layar tetap menyala</span>
      <video id="senderVideo" autoplay playsinline muted></video>
      <div class="ctrlbar" id="ctrlbar">
        <button class="roundbtn hidden" id="torchBtn" onclick="toggleTorch()" title="Flashlight">🔦</button>

        <div class="btngroup hidden" id="zoomGroup" title="Zoom">
          <button onclick="stepZoom(-1)">−</button>
          <span class="label" id="zoomLabel">1.0x</span>
          <button onclick="stepZoom(1)">+</button>
        </div>

        <div class="btngroup hidden" id="focusGroup" title="Fokus">
          <button id="focusModeBtn" onclick="toggleFocusMode()">AF</button>
          <button class="hidden" id="focusMinusBtn" onclick="stepFocus(-1)">−</button>
          <button class="hidden" id="focusPlusBtn" onclick="stepFocus(1)">+</button>
        </div>

        <div class="btngroup hidden" id="wbGroup" title="White Balance">
          <button id="wbModeBtn" onclick="toggleWbMode()">AWB</button>
          <button class="hidden" id="wbMinusBtn" onclick="stepWb(-1)">−</button>
          <button class="hidden" id="wbPlusBtn" onclick="stepWb(1)">+</button>
        </div>

        <div class="btngroup" id="orientGroup" title="Orientasi layar">
          <button id="orientPortraitBtn" onclick="lockOrientationMode('portrait')">📱</button>
          <button id="orientLandscapeBtn" onclick="lockOrientationMode('landscape')">🖥️</button>
          <button id="orientFreeBtn" onclick="lockOrientationMode(null)">🔓</button>
        </div>

        <button class="roundbtn" id="fsBtn" onclick="toggleFullscreen()" title="Layar penuh">⛶</button>
        <button class="roundbtn" id="micBtn" onclick="toggleMic()" title="Mikrofon">🎤</button>
        <button class="roundbtn" onclick="switchCamera()" title="Ganti kamera">🔄</button>
        <button class="roundbtn off" onclick="stopSending()" title="Berhenti">✖</button>
      </div>
    </div>
  </div>

  <!-- MODE PENERIMA (OBS) -->
  <div id="receiverView" class="view hidden">
    <div class="form" id="receiverForm">
      <input id="roomInputRecv" placeholder="Kode ruangan (samakan dgn HP), mis: rt07-kamera1">
      <button onclick="startReceiving()">Mulai Terima</button>
    </div>
    <div id="receiverWrap" class="hidden">
      <video id="receiverVideo" autoplay playsinline></video>
      <div id="recvOverlay">Menunggu kamera...</div>
    </div>
  </div>

</div>

<script>
const qs = new URLSearchParams(location.search);
let peer, currentStream, currentCall, facingMode = 'environment';
let currentVideoTrack = null, wakeLock = null;
let torchOn = false, zoomVal = 1, focusManual = false, focusVal = 0, wbManual = false, wbVal = 4000;

// Konfigurasi jalur koneksi: STUN dulu (buat P2P langsung),
// TURN jadi cadangan kalau P2P diblokir NAT/firewall (jaringan kantor/kampus, dsb).
// TURN publik gratis dari Open Relay Project — cukup buat kebutuhan wajar,
// kalau nanti butuh lebih stabil/berat sebaiknya ganti ke TURN berbayar sendiri.
const ICE_CONFIG = {
  iceServers: [
    { urls: 'stun:stun.relay.metered.ca:80' },
    { urls: 'turn:global.relay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
    { urls: 'turn:global.relay.metered.ca:80?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' },
    { urls: 'turn:global.relay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
    { urls: 'turn:global.relay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
  ]
};

function goMode(mode){
  document.getElementById('modeSelect').classList.add('hidden');
  if(mode === 'sender'){
    document.getElementById('senderView').classList.remove('hidden');
  } else {
    document.getElementById('receiverView').classList.remove('hidden');
  }
}

// Auto-jalan lewat URL, contoh untuk OBS Browser Source:
// kamera-ke-obs.html?mode=receiver&room=rt07-kamera1&auto=1
window.addEventListener('load', () => {
  const mode = qs.get('mode');
  const room = qs.get('room');
  if(mode === 'receiver'){
    goMode('receiver');
    if(room) document.getElementById('roomInputRecv').value = room;
    if(room && qs.get('auto') === '1') startReceiving();
  } else if(mode === 'sender'){
    goMode('sender');
    if(room) document.getElementById('roomInputSend').value = room;
  }
});

// Cek lewat jalur apa koneksi berjalan: langsung (host/srflx) atau relay (TURN)
function checkConnectionPath(call, labelEl, prefix){
  if(!call || !call.peerConnection) return;
  setTimeout(async () => {
    try{
      const stats = await call.peerConnection.getStats();
      let path = 'langsung';
      stats.forEach(r => {
        if(r.type === 'candidate-pair' && r.state === 'succeeded' && r.nominated){
          const local = stats.get(r.localCandidateId);
          if(local && local.candidateType === 'relay') path = 'lewat relay (TURN)';
        }
      });
      labelEl.textContent = prefix + ' — jalur: ' + path;
    } catch(e){ /* abaikan, tidak semua browser mendukung getStats detail ini */ }
  }, 2500);
}

/* ---------------- PENGIRIM (HP) ---------------- */
async function startSending(){
  const room = document.getElementById('roomInputSend').value.trim();
  if(!room){ alert('Isi kode ruangan dulu, samakan dengan yang di OBS.'); return; }

  const statusEl = document.getElementById('senderStatus');
  statusEl.textContent = 'Meminta izin kamera...';

  try{
    currentStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: facingMode }, width:{ideal:1280}, height:{ideal:720} },
      audio: true
    });
  } catch(e){
    statusEl.textContent = 'Gagal akses kamera: ' + e.message;
    statusEl.className = 'status err';
    return;
  }

  document.getElementById('senderForm').classList.add('hidden');
  document.getElementById('senderPreviewWrap').classList.remove('hidden');
  const localVideo = document.getElementById('senderVideo');
  localVideo.srcObject = currentStream;

  setupTrackControls(currentStream.getVideoTracks()[0]);
  requestWakeLock();
  // Coba masuk layar penuh otomatis (masih dalam konteks tap tombol Mulai Kirim)
  enterFullscreen();

  peer = new Peer(undefined, { debug: 1, config: ICE_CONFIG });

  peer.on('open', () => {
    statusEl.textContent = 'Menghubungkan ke OBS...';
    currentCall = peer.call(room, currentStream);
    currentCall.on('stream', () => {
      statusEl.textContent = 'Tersambung ke OBS ✔';
      statusEl.className = 'status ok';
      checkConnectionPath(currentCall, statusEl, 'Tersambung ke OBS');
    });
    currentCall.on('close', () => {
      statusEl.textContent = 'Terputus dari OBS';
      statusEl.className = 'status err';
    });
    currentCall.on('error', (err) => {
      statusEl.textContent = 'Error: ' + err;
      statusEl.className = 'status err';
    });
  });

  peer.on('error', (err) => {
    statusEl.textContent = 'Error koneksi: ' + err.type + ' (pastikan mode Terima sudah aktif dengan kode yang sama)';
    statusEl.className = 'status err';
  });
}

function stopSending(){
  try{ if(wakeLock){ wakeLock.release(); wakeLock = null; } }catch(e){}
  try{ if(currentStream) currentStream.getTracks().forEach(t => t.stop()); }catch(e){}
  try{ if(currentCall) currentCall.close(); }catch(e){}
  try{ if(peer) peer.destroy(); }catch(e){}
  location.reload();
}

function toggleMic(){
  if(!currentStream) return;
  const track = currentStream.getAudioTracks()[0];
  if(!track) return;
  track.enabled = !track.enabled;
  document.getElementById('micBtn').classList.toggle('off', !track.enabled);
}

async function switchCamera(){
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  try{
    const newStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: facingMode }, width:{ideal:1280}, height:{ideal:720} },
      audio: true
    });
    const newVideoTrack = newStream.getVideoTracks()[0];
    document.getElementById('senderVideo').srcObject = newStream;

    if(currentCall && currentCall.peerConnection){
      const sender = currentCall.peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
      if(sender) sender.replaceTrack(newVideoTrack);
    }
    if(currentStream){ currentStream.getTracks().forEach(t => t.stop()); }
    currentStream = newStream;
    setupTrackControls(newVideoTrack);
  } catch(e){
    alert('Gagal ganti kamera: ' + e.message);
  }
}

/* ---------------- Kontrol kamera lanjutan ---------------- */
// Deteksi kemampuan kamera & tampilkan/sembunyikan tombol sesuai dukungan device
function setupTrackControls(track){
  currentVideoTrack = track;
  torchOn = false; focusManual = false; wbManual = false;
  const caps = (track && track.getCapabilities) ? track.getCapabilities() : {};

  const torchBtn = document.getElementById('torchBtn');
  torchBtn.classList.toggle('hidden', !caps.torch);
  torchBtn.classList.remove('active');

  const zoomGroup = document.getElementById('zoomGroup');
  if(caps.zoom){
    zoomGroup.classList.remove('hidden');
    zoomVal = (track.getSettings && track.getSettings().zoom) || caps.zoom.min || 1;
    updateZoomLabel();
  } else {
    zoomGroup.classList.add('hidden');
  }

  const focusGroup = document.getElementById('focusGroup');
  const focusModeBtn = document.getElementById('focusModeBtn');
  if(caps.focusDistance && caps.focusMode && caps.focusMode.includes('manual')){
    focusGroup.classList.remove('hidden');
    focusModeBtn.textContent = 'AF';
    document.getElementById('focusMinusBtn').classList.add('hidden');
    document.getElementById('focusPlusBtn').classList.add('hidden');
    focusVal = caps.focusDistance.min;
  } else {
    focusGroup.classList.add('hidden');
  }

  const wbGroup = document.getElementById('wbGroup');
  const wbModeBtn = document.getElementById('wbModeBtn');
  if(caps.colorTemperature && caps.whiteBalanceMode && caps.whiteBalanceMode.includes('manual')){
    wbGroup.classList.remove('hidden');
    wbModeBtn.textContent = 'AWB';
    document.getElementById('wbMinusBtn').classList.add('hidden');
    document.getElementById('wbPlusBtn').classList.add('hidden');
    wbVal = caps.colorTemperature.min;
  } else {
    wbGroup.classList.add('hidden');
  }
}

function applyAdvanced(constraint){
  if(!currentVideoTrack) return;
  currentVideoTrack.applyConstraints({ advanced: [constraint] }).catch(e => console.warn('Constraint tidak didukung:', constraint, e));
}

function toggleTorch(){
  torchOn = !torchOn;
  document.getElementById('torchBtn').classList.toggle('active', torchOn);
  applyAdvanced({ torch: torchOn });
}

function updateZoomLabel(){
  document.getElementById('zoomLabel').textContent = zoomVal.toFixed(1) + 'x';
}
function stepZoom(dir){
  if(!currentVideoTrack || !currentVideoTrack.getCapabilities) return;
  const caps = currentVideoTrack.getCapabilities();
  if(!caps.zoom) return;
  const step = caps.zoom.step || 0.5;
  zoomVal = Math.min(caps.zoom.max, Math.max(caps.zoom.min, zoomVal + dir * step));
  updateZoomLabel();
  applyAdvanced({ zoom: zoomVal });
}

function toggleFocusMode(){
  focusManual = !focusManual;
  document.getElementById('focusModeBtn').textContent = focusManual ? 'MF' : 'AF';
  document.getElementById('focusMinusBtn').classList.toggle('hidden', !focusManual);
  document.getElementById('focusPlusBtn').classList.toggle('hidden', !focusManual);
  applyAdvanced({ focusMode: focusManual ? 'manual' : 'continuous', focusDistance: focusManual ? focusVal : undefined });
}
function stepFocus(dir){
  if(!currentVideoTrack || !currentVideoTrack.getCapabilities) return;
  const caps = currentVideoTrack.getCapabilities();
  if(!caps.focusDistance) return;
  const step = caps.focusDistance.step || ((caps.focusDistance.max - caps.focusDistance.min) / 20);
  focusVal = Math.min(caps.focusDistance.max, Math.max(caps.focusDistance.min, focusVal + dir * step));
  applyAdvanced({ focusMode: 'manual', focusDistance: focusVal });
}

function toggleWbMode(){
  wbManual = !wbManual;
  document.getElementById('wbModeBtn').textContent = wbManual ? 'MWB' : 'AWB';
  document.getElementById('wbMinusBtn').classList.toggle('hidden', !wbManual);
  document.getElementById('wbPlusBtn').classList.toggle('hidden', !wbManual);
  applyAdvanced({ whiteBalanceMode: wbManual ? 'manual' : 'continuous', colorTemperature: wbManual ? wbVal : undefined });
}
function stepWb(dir){
  if(!currentVideoTrack || !currentVideoTrack.getCapabilities) return;
  const caps = currentVideoTrack.getCapabilities();
  if(!caps.colorTemperature) return;
  const step = caps.colorTemperature.step || 100;
  wbVal = Math.min(caps.colorTemperature.max, Math.max(caps.colorTemperature.min, wbVal + dir * step));
  applyAdvanced({ whiteBalanceMode: 'manual', colorTemperature: wbVal });
}

/* Layar penuh */
async function enterFullscreen(){
  try{
    if(document.documentElement.requestFullscreen){ await document.documentElement.requestFullscreen(); return; }
    if(document.documentElement.webkitRequestFullscreen){ document.documentElement.webkitRequestFullscreen(); return; }
  }catch(e){ /* lanjut ke fallback iOS di bawah */ }
  try{
    const v = document.getElementById('senderVideo');
    if(v.webkitEnterFullscreen) v.webkitEnterFullscreen();
  }catch(e2){ /* device tidak mendukung, abaikan */ }
}
function toggleFullscreen(){
  if(document.fullscreenElement){ document.exitFullscreen(); }
  else { enterFullscreen(); }
}

/* Kunci orientasi layar (Android Chrome; iOS Safari umumnya tidak mendukung) */
async function lockOrientationMode(mode){
  document.querySelectorAll('#orientGroup button').forEach(b => b.classList.remove('active'));
  try{
    if(mode === null){
      if(screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
      document.getElementById('orientFreeBtn').classList.add('active');
      return;
    }
    if(screen.orientation && screen.orientation.lock){
      await screen.orientation.lock(mode);
      document.getElementById(mode === 'portrait' ? 'orientPortraitBtn' : 'orientLandscapeBtn').classList.add('active');
    } else {
      throw new Error('tidak didukung');
    }
  }catch(e){
    alert('Kunci orientasi tidak didukung di browser/HP ini (biasanya perlu Android + Chrome, dan mode layar penuh aktif). Silakan putar HP secara manual.');
  }
}

/* Layar tetap menyala selama kamera aktif */
async function requestWakeLock(){
  if('wakeLock' in navigator){
    try{ wakeLock = await navigator.wakeLock.request('screen'); }
    catch(e){ console.warn('Wake lock gagal:', e); }
  }
}
document.addEventListener('visibilitychange', async () => {
  if(document.visibilityState === 'visible' && currentStream && !wakeLock){
    requestWakeLock();
  }
});

/* ---------------- PENERIMA (OBS) ---------------- */
function startReceiving(){
  const room = document.getElementById('roomInputRecv').value.trim();
  if(!room){ alert('Isi kode ruangan dulu, samakan dengan yang di HP.'); return; }

  document.getElementById('receiverForm').classList.add('hidden');
  document.getElementById('receiverWrap').classList.remove('hidden');
  const overlay = document.getElementById('recvOverlay');

  peer = new Peer(room, { debug: 1, config: ICE_CONFIG });

  peer.on('open', () => {
    overlay.textContent = 'Siap. Menunggu HP menyambung ke kode: ' + room;
  });

  peer.on('call', (call) => {
    overlay.textContent = 'Kamera masuk, menyambungkan...';
    call.answer(); // tanpa kirim stream balik
    call.on('stream', (remoteStream) => {
      document.getElementById('receiverVideo').srcObject = remoteStream;
      overlay.textContent = 'Live ✔';
      checkConnectionPath(call, overlay, 'Live');
      setTimeout(() => { if(overlay.textContent.indexOf('Live') === 0) overlay.style.opacity = '0.15'; }, 4000);
    });
    call.on('close', () => {
      overlay.style.opacity = '1';
      overlay.textContent = 'Kamera terputus, menunggu lagi...';
    });
  });

  peer.on('error', (err) => {
    overlay.style.opacity = '1';
    overlay.textContent = 'Error: ' + err.type;
    if(err.type === 'unavailable-id'){
      overlay.textContent = 'Kode ruangan ini sedang dipakai tab lain, coba reload.';
    }
  });
}
</script>
</body>
</html>
